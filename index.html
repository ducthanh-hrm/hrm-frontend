<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HRM Project</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      width: 420px;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .box::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(90deg, #22d3ee, #a855f7, #22d3ee);
      animation: spin 3s linear infinite;
      z-index: -1;
    }

    .box::after {
      content: "";
      position: absolute;
      inset: 3px;
      background: #020617;
      border-radius: 14px;
      z-index: -1;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    p {
      opacity: 0.85;
      line-height: 1.6;
    }

    .loader {
      margin: 20px auto;
      width: 36px;
      height: 36px;
      border: 4px solid #334155;
      border-top: 4px solid #22d3ee;
      border-radius: 50%;
      animation: loading 1s linear infinite;
    }

    @keyframes loading {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚧 Dự án đang phát triển</h1>
    <div class="loader"></div>
    <p>
      Hệ thống quản lý nhân sự (HRM)<br>
      <strong>Nguyễn Đức Thành</strong> & <strong>Mai Văn Trường</strong>
    </p>
  </div>
</body>
</html>
